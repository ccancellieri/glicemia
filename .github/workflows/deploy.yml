name: Deploy GliceMia

on:
  push:
    branches: [main]
    paths:
      - 'agent.py'
      - 'app/**'
      - 'scripts/**'
      - 'requirements.txt'
      - '.env.example'
      - '!website/**'
      - '!docs/**'
      - '!**.md'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'manual trigger'

jobs:
  deploy:
    name: Deploy to Oracle Cloud VM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          # AI backend (environment variables)
          AI_MODEL: ${{ vars.AI_MODEL }}
          OLLAMA_API_BASE: ${{ vars.OLLAMA_API_BASE }}
          AI_FALLBACK_MODEL: ${{ vars.AI_FALLBACK_MODEL }}
          AI_FALLBACK_ENABLED: ${{ vars.AI_FALLBACK_ENABLED }}
          AI_TIMEOUT_SECONDS: ${{ vars.AI_TIMEOUT_SECONDS }}
          # Infra (environment variables)
          DB_PATH: ${{ vars.DB_PATH }}
          WEBAPP_PORT: ${{ vars.WEBAPP_PORT }}
          WEBAPP_URL: ${{ vars.WEBAPP_URL }}
          # Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          DB_PASSPHRASE: ${{ secrets.DB_PASSPHRASE }}
          # Deploy target
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: AI_MODEL,OLLAMA_API_BASE,AI_FALLBACK_MODEL,AI_FALLBACK_ENABLED,AI_TIMEOUT_SECONDS,DB_PATH,WEBAPP_PORT,WEBAPP_URL,GEMINI_API_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_ALLOWED_USERS,DB_PASSPHRASE,DEPLOY_PATH
          script_stop: true
          script: |
            set -e
            cd "$DEPLOY_PATH"

            echo "--- write .env ---"
            {
              echo "AI_MODEL=${AI_MODEL}"
              echo "OLLAMA_API_BASE=${OLLAMA_API_BASE}"
              echo "AI_FALLBACK_MODEL=${AI_FALLBACK_MODEL}"
              echo "AI_FALLBACK_ENABLED=${AI_FALLBACK_ENABLED}"
              echo "AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS}"
              echo "GEMINI_API_KEY=${GEMINI_API_KEY}"
              echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}"
              echo "TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}"
              echo "DB_PASSPHRASE=${DB_PASSPHRASE}"
              echo "DB_PATH=${DB_PATH}"
              echo "WEBAPP_PORT=${WEBAPP_PORT}"
              echo "WEBAPP_URL=${WEBAPP_URL}"
            } > .env
            chmod 600 .env

            echo "--- git pull ---"
            git pull origin main

            echo "--- pip install ---"
            source venv/bin/activate
            pip install -q -r requirements.txt

            echo "--- restart service ---"
            sudo systemctl restart glicemia

            echo "--- health check ---"
            sleep 5
            if sudo systemctl is-active --quiet glicemia; then
              echo "glicemia is running"
            else
              echo "ERROR: glicemia failed to start"
              sudo journalctl -u glicemia -n 30 --no-pager
              exit 1
            fi
